<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Algebra Engine</title>

    <link rel="stylesheet" href="style.css" />
    <script type="module" src="load.js"></script>
    <script type="module" src="index.js"></script>
  </head>
  <body data-bs-theme="dark">
    <div class="container mt-3">
      <math-field id="math-input" placeholder="\text{Enter Expression}">
        <!-- \solve{\left(\left\lbrack
        abc=24,a^2+b^2=13,a^2+b^2+c^3=77\right\rbrack\right)} -->
        \operatorname{solve}\left(\left\lbrack
        x^2+11=4y^2,x^2+y=28\right\rbrack,x,y\right)
      </math-field>
    </div>

    <div class="accordion" id="ae-ouput">
      <div class="accordion-item" id="math-final-container">
        <h2 class="accordion-header">
          <button
            class="accordion-button justify-content-center text-center"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#toggleAnswer"
            aria-expanded="true"
            aria-controls="toggleAnswer"
          >
            <span id="math-success">✅</span> Final Answer
          </button>
        </h2>
        <div id="toggleAnswer" class="accordion-collapse collapse show">
          <div class="accordion overflow-auto" id="math-final"></div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button
            class="accordion-button collapsed"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#math-steps-collapse"
            aria-expanded="false"
            aria-controls="math-steps-collapse"
          >
            📘 Steps <span id="solve-title"></span>
          </button>
        </h2>
        <div id="math-steps-collapse" class="accordion-collapse collapse">
          <div class="accordion-body" id="math-steps"></div>
        </div>
      </div>
    </div>
  </body>
</html>
